<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Поддержка</title>
    <style>
      :root {
        --bg: #f3f4f6; --card: #ffffff; --text: #111827; --muted: #6b7280;
        --accent: #2563eb; --accent-text: #ffffff; --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: Inter, -apple-system, sans-serif;
        background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent;
      }
      .wrap { max-width: 600px; margin: 0 auto; padding: 16px; }
      .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; padding: 18px;
      }
      h1 { margin: 0 0 16px; font-size: 20px; font-weight: 700; text-align: center; }
      label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--muted); }
      
      input, textarea, select, button {
        width: 100%; border-radius: 12px; border: 1px solid var(--border);
        padding: 12px; font-size: 15px; background: #fff; color: var(--text);
        outline: none; transition: border-color 0.2s;
      }
      input:focus, textarea:focus { border-color: var(--accent); }
      textarea { min-height: 160px; resize: none; }
      
      button {
        cursor: pointer; border: 0; background: var(--accent);
        color: var(--accent-text); font-weight: 600; margin-top: 20px;
      }
      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Новое обращение</h1>
        
        <form id="ticketForm">
          <label for="category">Категория</label>
          <select id="category" style="margin-bottom: 16px;">
            <option value="technical">Техническая поддержка</option>
            <option value="question">Связаться с менеджером</option>
            <option value="other">Другое</option>
          </select>

          <label for="title">Тема</label>
          <input id="title" maxlength="120" required placeholder="Кратко назовите проблему" style="margin-bottom: 16px;" />

          <label for="description">Описание</label>
          <textarea id="description" maxlength="2000" required placeholder="Подробно опишите вашу ситуацию..."></textarea>

          <button id="submitBtn" type="submit">Отправить боту</button>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const ticketForm = document.getElementById("ticketForm");
        const webApp = window.WebApp || window.Telegram?.WebApp || null;

        if (webApp) {
          webApp.ready();
          webApp.expand?.(); // Разворачиваем на весь экран
        }

        ticketForm.addEventListener("submit", function (event) {
          event.preventDefault();

          const data = {
            action: "create_ticket",
            title: document.getElementById("title").value.trim(),
            description: document.getElementById("description").value.trim(),
            category: document.getElementById("category").value
          };

          if (webApp && webApp.sendData) {
            // Метод преобразует объект в строку и отправляет боту
            // Приложение при этом автоматически закроется
            webApp.sendData(JSON.stringify(data));
          } else {
            console.log("Данные для отправки:", data);
            alert("Ошибка: функция sendData доступна только внутри мессенджера.");
          }
        });
      })();
    </script>
  </body>
</html>
